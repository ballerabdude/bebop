# `cross` (https://github.com/cross-rs/cross) configuration.
#
# The agent links against `libdbus-1` (transitively, via the `bluer` crate's
# dependency on `libdbus-sys`) so the cross-build container needs the
# matching multiarch headers + pkg-config wiring for the target.
#
# We deliberately avoid the distro `protobuf-compiler` package: the default
# `cross` images are still based on Ubuntu 16.04, whose protoc (2.6.1) does
# not understand `syntax = "proto3"`. Instead we drop a current protoc
# release binary into /usr/local at image-build time. protoc runs on the
# build host (x86_64), not on the aarch64 target, so we grab the
# linux-x86_64 release.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes pkg-config curl unzip ca-certificates libdbus-1-dev:$CROSS_DEB_ARCH",
    "curl -fsSL -o /tmp/protoc.zip https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip",
    "unzip -o /tmp/protoc.zip -d /usr/local",
    "rm /tmp/protoc.zip",
    "chmod +x /usr/local/bin/protoc",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
]
