syntax = "proto3";

package bebop.v1;

// ---------------------------------------------------------------------------
// Envelope: every BLE write/notify payload is one of these.
// Keep individual messages well under the negotiated ATT MTU (often 185-517).
// For larger payloads, chunk at the transport layer.
// ---------------------------------------------------------------------------

message ClientRequest {
  uint32 request_id = 1;
  oneof payload {
    GetDeviceInfoRequest         get_device_info          = 10;
    ScanWifiRequest              scan_wifi                = 11;
    SetWifiCredentialsRequest    set_wifi_credentials     = 12;
    GetWifiStatusRequest         get_wifi_status          = 13;
    SetRobotConfigRequest        set_robot_config         = 14;
    GetRobotConfigRequest        get_robot_config         = 15;
    GetAppStatusRequest          get_app_status           = 16;
    ControlAppRequest            control_app              = 17;
    TriggerOtaRequest            trigger_ota              = 18;
    GetOtaStatusRequest          get_ota_status           = 19;
    SetAppImageRequest           set_app_image            = 20;
    ScanControllersRequest       scan_controllers         = 21;
    PairControllerRequest        pair_controller          = 22;
    UnpairControllerRequest      unpair_controller        = 23;
    GetControllerStatusRequest   get_controller_status    = 24;
  }
}

message AgentResponse {
  uint32 request_id = 1;
  ResponseStatus status = 2;
  string message = 3; // human readable error/info
  oneof payload {
    DeviceInfo            device_info             = 10;
    WifiScanResult        wifi_scan_result        = 11;
    WifiStatus            wifi_status             = 12;
    RobotConfig           robot_config            = 13;
    AppStatus             app_status              = 14;
    OtaStatus             ota_status              = 15;
    ControllerScanResult  controller_scan_result  = 16;
    ControllerStatus      controller_status       = 17;
  }
}

enum ResponseStatus {
  RESPONSE_STATUS_UNSPECIFIED = 0;
  RESPONSE_STATUS_OK = 1;
  RESPONSE_STATUS_ERROR = 2;
  RESPONSE_STATUS_UNAUTHORIZED = 3;
  RESPONSE_STATUS_IN_PROGRESS = 4;
}

// ---------------------------------------------------------------------------
// Device info
// ---------------------------------------------------------------------------

message GetDeviceInfoRequest {}

message DeviceInfo {
  string serial_number = 1;
  string model = 2;             // e.g. "bebop-v1"
  string agent_version = 3;     // semver of bebop-agent
  string jetpack_version = 4;
  string hostname = 5;
}

// ---------------------------------------------------------------------------
// Wi-Fi provisioning
// ---------------------------------------------------------------------------

message ScanWifiRequest {}

message WifiNetwork {
  string ssid = 1;
  int32  signal_dbm = 2;
  string security = 3; // "WPA2", "WPA3", "OPEN", ...
  bool   saved = 4;
}

message WifiScanResult {
  repeated WifiNetwork networks = 1;
}

message SetWifiCredentialsRequest {
  string ssid = 1;
  string password = 2;
  bool   hidden = 3;
}

message GetWifiStatusRequest {}

message WifiStatus {
  bool   connected = 1;
  string ssid = 2;
  string ip_address = 3;
  int32  signal_dbm = 4;
}

// ---------------------------------------------------------------------------
// Robot configuration (opaque key/value bag for product-specific settings)
// ---------------------------------------------------------------------------

message RobotConfig {
  string robot_name = 1;
  string owner_id = 2;
  string timezone = 3;
  map<string, string> extra = 100;
}

message SetRobotConfigRequest {
  RobotConfig config = 1;
}

message GetRobotConfigRequest {}

// ---------------------------------------------------------------------------
// Application (container) management
// ---------------------------------------------------------------------------

enum AppState {
  APP_STATE_UNSPECIFIED = 0;
  APP_STATE_STOPPED = 1;
  APP_STATE_STARTING = 2;
  APP_STATE_RUNNING = 3;
  APP_STATE_CRASHED = 4;
  APP_STATE_UPDATING = 5;
}

message AppStatus {
  string app_name = 1;
  string image = 2;           // e.g. "registry/bebop-app:1.2.3"
  string image_digest = 3;
  AppState state = 4;
  string container_id = 5;
  int64  started_at_unix = 6;
  int32  restart_count = 7;
}

message GetAppStatusRequest {}

enum AppCommand {
  APP_COMMAND_UNSPECIFIED = 0;
  APP_COMMAND_START = 1;
  APP_COMMAND_STOP = 2;
  APP_COMMAND_RESTART = 3;
}

message ControlAppRequest {
  string app_name = 1;
  AppCommand command = 2;
}

// Update the configured robot-app container image and persist it to
// the agent's on-disk config. Empty string clears the configured image
// (the supervisor then idles). The new image takes effect on the next
// container restart (control_app with APP_COMMAND_RESTART, or
// stop+start). Response: AppStatus reflecting the current container.
message SetAppImageRequest {
  string image = 1;
}

// ---------------------------------------------------------------------------
// OTA updates
// ---------------------------------------------------------------------------

message TriggerOtaRequest {
  // If empty, agent consults its configured update channel.
  string target_image = 1;
}

enum OtaState {
  OTA_STATE_UNSPECIFIED = 0;
  OTA_STATE_IDLE = 1;
  OTA_STATE_CHECKING = 2;
  OTA_STATE_DOWNLOADING = 3;
  OTA_STATE_APPLYING = 4;
  OTA_STATE_SUCCESS = 5;
  OTA_STATE_FAILED = 6;
}

message OtaStatus {
  OtaState state = 1;
  string  current_image = 2;
  string  target_image = 3;
  uint32  progress_percent = 4;
  string  error = 5;
}

message GetOtaStatusRequest {}

// ---------------------------------------------------------------------------
// Bluetooth gamepad pairing & teleop
//
// The agent acts as a BT Classic central for pairing arbitrary HID gamepads
// (PS5 DualSense, Xbox, 8BitDo, generic). Once a pad is paired the agent
// reads /dev/input/eventX and forwards body-velocity teleop commands as
// JSON-over-UDP to bebop-linux. See bebop-agent/src/controller/ for the
// implementation. Only one paired gamepad is active at a time; pairing a
// new device replaces the previous binding.
// ---------------------------------------------------------------------------

message ScanControllersRequest {
  // Discovery duration in milliseconds. Defaults to ~8000 if zero.
  uint32 timeout_ms = 1;
}

message PairControllerRequest {
  // BT MAC address (colon-separated, uppercase) as returned by
  // ScanControllers. Agent runs `bluetoothctl pair / trust / connect`
  // and persists the MAC to agent.toml on success.
  string mac = 1;
}

message UnpairControllerRequest {
  // BT MAC to remove. If empty, the currently paired controller is
  // unpaired.
  string mac = 1;
}

message GetControllerStatusRequest {}

message DiscoveredController {
  string mac       = 1;
  string name      = 2;
  int32  rssi      = 3;
  bool   paired    = 4;
  bool   connected = 5;
  // "gamepad" if the device's Class-of-Device or HID descriptor look
  // like a gamepad/joystick; "unknown" otherwise. The mobile app
  // hides non-gamepads by default.
  string kind      = 6;
}

message ControllerScanResult {
  repeated DiscoveredController devices = 1;
}

message ControllerStatus {
  // Whether the controller subsystem is enabled in agent.toml.
  bool   enabled            = 1;
  // MAC + cached human-readable name of the currently bound controller.
  // Empty when no controller has been paired.
  string paired_mac         = 2;
  string device_name        = 3;
  // Whether the OS sees the paired controller as currently connected.
  bool   connected          = 4;
  // True iff the deadman trigger is held AND the e-stop latch is clear.
  // Velocity commands only flow downstream when this is true.
  bool   armed              = 5;
  bool   estop_latched      = 6;
  // Wall-clock timestamp of the most recent input event from the pad
  // (milliseconds since the Unix epoch). Zero before any events arrive.
  int64  last_event_unix_ms = 7;
  // UDP target the agent forwards teleop commands to (e.g. "127.0.0.1:10000").
  string target_addr        = 8;
}
