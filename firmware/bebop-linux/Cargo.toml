[package]
name = "bebop-linux"
version = "0.1.0"
edition = "2021"
authors = ["Bebop Bot Team"]
description = "Linux-based firmware for Bebop robot using SocketCAN and ONNX"

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full", "rt-multi-thread", "time", "sync", "signal", "net"] }
futures = "0.3"

# CAN bus
socketcan = "3.3"

# ONNX Runtime for neural network inference  
ort = "2.0.0-rc.11"
ndarray = "0.16"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Math
nalgebra = "0.32"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Configuration
toml = "0.8"

# Time handling
chrono = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.dev]
opt-level = 1
