; PlatformIO Project Configuration File
;
; Teensy 4.1 CAN Bridge for Bebop Robot
;
; Build modes:
;   pio run -e sim        # Isaac Sim HIL (primary development mode)
;   pio run -e ros        # micro-ROS bridge (external policy runner)
;
; Upload: pio run -e <mode> --target upload
; Monitor: pio device monitor (or cat /dev/ttyACM2)

[platformio]
default_envs = sim  ; Default to simulation mode

; =============================================================================
; COMMON SETTINGS
; =============================================================================
[env]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
upload_protocol = teensy-cli

; Common libraries
lib_deps = 
    ; FlexCAN for Teensy 4.x
    https://github.com/tonton81/FlexCAN_T4.git
    adafruit/Adafruit BNO08x@^1.2.3

; =============================================================================
; SIM MODE: Isaac Sim hardware-in-the-loop (PRIMARY DEVELOPMENT MODE)
; - Receives sensor data from Isaac Sim via micro-ROS
; - Runs policy inference on Teensy
; - Sends commands back to Isaac Sim
; =============================================================================
[env:sim]
build_src_filter = 
    +<*>
    -<main.cpp>
    +<main_sim.cpp>

build_flags = 
    -D USB_DUAL_SERIAL
    -D ARDUINO_TEENSY41
    -D __IMXRT1062__
    -D SIM_MODE
    -O2
    -L.pio/libdeps/sim/micro_ros_arduino/src/imxrt1062/fpv5-d16-hard
    -lmicroros

lib_deps = 
    ${env.lib_deps}
    https://github.com/micro-ROS/micro_ros_arduino.git

board_build.extra_flags = 
    -DUSB_DUAL_SERIAL

; =============================================================================
; ROS MODE: Hardware deployment with micro-ROS
; - Runs policy inference on Teensy
; - Reads real sensors (IMU, motor encoders) via CAN
; - Publishes state to ROS2 via micro-ROS
; =============================================================================
[env:ros]
build_src_filter = 
    +<*>
    -<main_sim.cpp>

build_flags = 
    -D USB_DUAL_SERIAL
    -D ARDUINO_TEENSY41
    -D __IMXRT1062__
    -D ROS_MODE
    -O2
    -L.pio/libdeps/ros/micro_ros_arduino/src/imxrt1062/fpv5-d16-hard
    -lmicroros

lib_deps = 
    ${env.lib_deps}
    https://github.com/micro-ROS/micro_ros_arduino.git

board_build.extra_flags = 
    -DUSB_DUAL_SERIAL
