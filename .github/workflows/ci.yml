name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ---------------------------------------------------------------------------
  # bebop-agent (jetson-agent/) — on-device daemon (BLE GATT, container
  # supervisor, OTA, controller subsystem). Runs the full host-side check
  # matrix on x86_64 Linux so the Linux-only modules (bluer, evdev, the
  # controller supervisor) are in the compile graph.
  # ---------------------------------------------------------------------------
  rust:
    name: agent · host checks (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetson-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (BlueZ, D-Bus, protoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jetson-agent

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  # Native arm64 release build for the Jetson. Pinned to `ubuntu-22.04-arm`
  # (glibc 2.35) so the binary is compatible with JetPack 6 (Ubuntu 22.04).
  jetson:
    name: agent · jetson (arm64) release build
    runs-on: ubuntu-22.04-arm
    needs: rust
    defaults:
      run:
        working-directory: jetson-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (BlueZ, D-Bus, protoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jetson-agent

      - name: Build bebop-agent (release)
        run: cargo build --release -p bebop-agent

      - uses: actions/upload-artifact@v4
        with:
          name: bebop-agent-aarch64
          path: jetson-agent/target/release/bebop-agent
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # bebop-linux (firmware/bebop-linux/) — robot firmware: SocketCAN +
  # ONNX Runtime control loop, and the protobuf-over-WS runtime API the
  # operator app talks to. Same x86_64 host checks then a native arm64
  # release build for deployment to the Jetson.
  #
  # System deps:
  #   * protobuf-compiler — bebop-proto (path dep) generates Rust code
  #     from .proto via prost-build at compile time.
  #   * pkg-config + cmake — sometimes needed by the `ort` crate's
  #     build script even when the `download-binaries` feature is
  #     enabled (and is, by default).
  # SocketCAN is pure-Rust (talks to the Linux kernel via libc) so no
  # apt package is needed.
  # ---------------------------------------------------------------------------
  firmware-rust:
    name: firmware · host checks (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/bebop-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (protoc, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config protobuf-compiler cmake

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/bebop-linux

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test

  firmware-jetson:
    name: firmware · jetson (arm64) release build
    runs-on: ubuntu-22.04-arm
    needs: firmware-rust
    defaults:
      run:
        working-directory: firmware/bebop-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (protoc, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config protobuf-compiler cmake

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/bebop-linux

      - name: Build bebop-linux (release)
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: bebop-linux-aarch64
          path: firmware/bebop-linux/target/release/bebop-linux
          if-no-files-found: error
