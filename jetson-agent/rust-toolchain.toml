# Pinning the Rust toolchain so every contributor and CI runs the same
# compiler. Bump this when a workspace dependency requires a newer rustc.
#
# We don't list any extra `targets` here: the agent is built natively
# against the host triple now (arm64 on the robot / dev box / CI runner),
# so rustup only needs the default std for the host.
[toolchain]
channel = "1.90.0"
components = ["rustfmt", "clippy"]
profile = "minimal"
