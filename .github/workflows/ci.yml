name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Host-side checks: format, lint, tests. Runs on Linux so BlueZ and the
  # real BLE server module are in the compile graph.
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetson-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (BlueZ, D-Bus, protoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jetson-agent

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  # Produce a Jetson (arm64) build artifact so we always have something
  # shippable on `main`. Built natively on a GitHub-hosted arm64 runner —
  # no `cross`/QEMU/Docker layer required. Pinned to `ubuntu-22.04-arm`
  # (glibc 2.35) so the binary is compatible with JetPack 6 (Ubuntu 22.04).
  jetson:
    runs-on: ubuntu-22.04-arm
    needs: rust
    defaults:
      run:
        working-directory: jetson-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (BlueZ, D-Bus, protoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jetson-agent

      - name: Build bebop-agent (release)
        run: cargo build --release -p bebop-agent

      - uses: actions/upload-artifact@v4
        with:
          name: bebop-agent-aarch64
          path: jetson-agent/target/release/bebop-agent
          if-no-files-found: error
