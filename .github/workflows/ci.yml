name: ci

on:
  push:
    branches: [main]
    # Tag pushes matching `firmware/v*` (e.g. firmware/v0.2.0) trigger a
    # bebop-linux release build whose bundle is published to GitHub Releases.
    # `install-jetson.sh` pulls from there by default.
    tags: ["firmware/v*"]
  pull_request:

permissions:
  contents: write   # required so `firmware-jetson` can create / update a
                    # GitHub Release on tag pushes. All other jobs run as
                    # read-only and don't consume this.

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ---------------------------------------------------------------------------
  # bebop-agent (jetson-agent/) — on-device daemon (BLE GATT, container
  # supervisor, OTA, controller subsystem). Runs the full host-side check
  # matrix on x86_64 Linux so the Linux-only modules (bluer, evdev, the
  # controller supervisor) are in the compile graph.
  # ---------------------------------------------------------------------------
  rust:
    name: agent · host checks (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetson-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (BlueZ, D-Bus, protoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jetson-agent

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  # Native arm64 release build for the Jetson. Pinned to `ubuntu-22.04-arm`
  # (glibc 2.35) so the binary is compatible with JetPack 6 (Ubuntu 22.04).
  jetson:
    name: agent · jetson (arm64) release build
    runs-on: ubuntu-22.04-arm
    needs: rust
    defaults:
      run:
        working-directory: jetson-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (BlueZ, D-Bus, protoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jetson-agent

      - name: Build bebop-agent (release)
        run: cargo build --release -p bebop-agent

      - uses: actions/upload-artifact@v4
        with:
          name: bebop-agent-aarch64
          path: jetson-agent/target/release/bebop-agent
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # bebop-linux (firmware/bebop-linux/) — robot firmware: SocketCAN +
  # ONNX Runtime control loop, and the protobuf-over-WS runtime API the
  # operator app talks to. Same x86_64 host checks then a native arm64
  # release build for deployment to the Jetson.
  #
  # System deps:
  #   * protobuf-compiler — bebop-proto (path dep) generates Rust code
  #     from .proto via prost-build at compile time.
  #   * pkg-config + cmake — sometimes needed by the `ort` crate's
  #     build script even when the `download-binaries` feature is
  #     enabled (and is, by default).
  # SocketCAN is pure-Rust (talks to the Linux kernel via libc) so no
  # apt package is needed.
  # ---------------------------------------------------------------------------
  firmware-rust:
    name: firmware · host checks (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/bebop-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (protoc, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config protobuf-compiler cmake

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/bebop-linux

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test

  firmware-jetson:
    name: firmware · jetson (arm64) release build
    runs-on: ubuntu-22.04-arm
    needs: firmware-rust
    defaults:
      run:
        working-directory: firmware/bebop-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (protoc, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config protobuf-compiler cmake

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/bebop-linux

      - name: Build bebop-linux (release)
        run: cargo build --release

      # Pack the binary together with the configs, the ONNX policy (graph +
      # external-data weights), and the systemd unit into a single tarball.
      # This is what the Jetson installer consumes — one download, one
      # untar, everything matches the same git SHA.
      - name: Stage firmware bundle
        working-directory: firmware/bebop-linux
        run: |
          set -euo pipefail
          rm -rf bundle
          install -d bundle/bin bundle/config bundle/systemd
          install -m 0755 target/release/bebop-linux       bundle/bin/bebop-linux
          install -m 0644 config/bebop_v2.yaml             bundle/config/bebop_v2.yaml
          install -m 0644 config/policy.onnx               bundle/config/policy.onnx
          install -m 0644 config/policy.onnx.data          bundle/config/policy.onnx.data
          install -m 0644 deploy/systemd/bebop-linux.service \
                                                           bundle/systemd/bebop-linux.service
          # Capture build provenance so the installer can log what it laid down.
          {
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > bundle/VERSION
          tar -C bundle -czf bebop-linux-aarch64.tar.gz .
          sha256sum bebop-linux-aarch64.tar.gz > bebop-linux-aarch64.tar.gz.sha256
          ls -lh bebop-linux-aarch64.tar.gz*

      # Always upload as a workflow artifact so `install-jetson.sh --run-id N`
      # can grab a pre-release build straight off `main`.
      - uses: actions/upload-artifact@v4
        with:
          name: bebop-linux-aarch64
          path: |
            firmware/bebop-linux/bebop-linux-aarch64.tar.gz
            firmware/bebop-linux/bebop-linux-aarch64.tar.gz.sha256
          if-no-files-found: error

      # On tag pushes (`firmware/v*`) attach the same bundle to a GitHub
      # Release. Default install path on the Jetson uses
      # `gh release download` against this Release.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/firmware/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware/bebop-linux/bebop-linux-aarch64.tar.gz
            firmware/bebop-linux/bebop-linux-aarch64.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
