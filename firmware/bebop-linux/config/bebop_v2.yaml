# ============================================================================
# Bebop V2 (humanoid) joint configuration.
#
# Loaded by `bebop-linux` at startup via `RobotConfig::from_yaml(path)`.
# Schema deliberately matches `ros2/src/bebop_pilot/config/safety_limits.yaml`
# so the same file can later become the single source of truth for both
# the Rust runtime and any ROS2 bridge nodes.
#
# All limits below are *our* safety envelope, not the manufacturer's max.
# Procedure for raising any one of them:
#   1.  Verify the joint can mechanically reach it (manual back-drive).
#   2.  In the dial-in tool, run the relevant test (e.g. vel_probe) at the
#       *current* limit and confirm the motor tracks without faulting.
#   3.  Edit a single field here, raising it by no more than ~25%, re-run.
#   4.  Repeat until you hit a real mechanical / thermal / current ceiling.
# Do not raise multiple limits at once — you lose the ability to attribute
# a fault to the change.
# ============================================================================

defaults:
  hard_limits:
    pos_min: -0.5             # rad — well inside the ±4π motor encoder range
    pos_max:  0.5
    vel_max:  2.0             # rad/s (~115 °/s)
    tau_max:  8.0             # Nm
    temp_max: 65.0            # °C — keep well below firmware overtemp (~85 °C)
    feedback_timeout_ms: 100  # E-STOP if no RX feedback within this window

  # Always-active gains while a motor is "armed" but no test is driving it.
  # Stiffness low; damping > 0 so the motor never goes limp under power.
  hold_gains: { kp: 5.0, kd: 1.0 }

  # Default gains for active tests (currently unused; phase 2).
  test_gains: { kp: 30.0, kd: 2.0 }

  # Setpoint slew limits. Independent of motor-side PD gains, these cap
  # the achievable jerk in the host-side TX path.
  slew:
    max_pos_step_per_tick: 0.005   # rad — at 100 Hz tick = 0.5 rad/s slew cap
    arm_ramp_s:            0.5     # gain ramp 0 → hold over arm
    abort_ramp_s:          0.3     # gain ramp hold → 0 over abort

# ============================================================================
# Joints. Index order matters for the ONNX policy: it MUST match
#   bebop_training/envs/bebop_v2_base_cfg.py:JOINT_NAMES_ALL
# Bebop V2 numbering convention: tens digit = side (3 = left, 4 = right),
# ones digit = joint level. Left leg lives on can0, right leg on can1.
# ============================================================================
joints:
  # ----- Hip abduction (RS04) -----------------------------------------------
  # Per-joint `hold_gains` override the soft built-in fallback (kp=5, kd=1)
  # which is too weak to move the leg under its own static load. The values
  # below are sized to overcome the measured gravity / preload torque at
  # each joint with ~0.02 rad of steady-state tracking error, while staying
  # an order of magnitude below each motor model's `kp_max`. Tune in place
  # one joint at a time per the procedure at the top of this file.
  hip_abduction_left_joint:
    can_interface: can0
    motor_id: 31
    model: RS04
    hard_limits: { pos_min: -1, pos_max: 1, vel_max: 3.5, tau_max: 25.0, temp_max: 70.0 }
    hold_gains:  { kp: 40.0,  kd: 3.0 }

  hip_abduction_right_joint:
    can_interface: can1
    motor_id: 41
    model: RS04
    hard_limits: { pos_min: -1, pos_max: 1, vel_max: 3.5, tau_max: 25.0, temp_max: 70.0 }
    hold_gains:  { kp: 40.0,  kd: 3.0 }

  # ----- Femur / hip pitch (RS03) -------------------------------------------
  femur_left_joint:
    can_interface: can0
    motor_id: 32
    model: RS03
    hard_limits: { pos_min: -1, pos_max: 1, vel_max: 3.5, tau_max: 25.0, temp_max: 70.0 }
    hold_gains:  { kp: 80.0,  kd: 3.0 }

  femur_right_joint:
    can_interface: can1
    motor_id: 42
    model: RS03
    hard_limits: { pos_min: -1, pos_max: 1, vel_max: 3.5, tau_max: 25.0, temp_max: 70.0 }
    hold_gains:  { kp: 80.0,  kd: 3.0 }

  # ----- Shin / knee (RS04) -------------------------------------------------
  shin_left_joint:
    can_interface: can0
    motor_id: 34
    model: RS04
    # Knee mostly flexes one way; tighter than hip on the +ve side.
    hard_limits: { pos_min: -1.570796, pos_max: 1.570796, vel_max: 4.0, tau_max: 30.0, temp_max: 70.0 }
    # Knee carries the full shin+foot moment, so a touch stiffer than hip.
    hold_gains:  { kp: 120.0, kd: 4.0 }

  shin_right_joint:
    can_interface: can1
    motor_id: 44
    model: RS04
    hard_limits: { pos_min: -1.570796, pos_max: 1.570796, vel_max: 4.0, tau_max: 30.0, temp_max: 70.0 }
    hold_gains:  { kp: 120.0, kd: 4.0 }

  # ----- Foot / ankle (RS02) ------------------------------------------------
  foot_left_joint:
    can_interface: can0
    motor_id: 35
    model: RS02
    hard_limits: { pos_min: -0.8, pos_max: 0.8, vel_max: 4.0, tau_max: 8.0, temp_max: 65.0 }
    # Ankle has the smallest lever arm and an RS02 (kp_max=500), so keep
    # this one modest to avoid chatter on the foot plate.
    hold_gains:  { kp: 30.0,  kd: 1.5 }

  foot_right_joint:
    can_interface: can1
    motor_id: 45
    model: RS02
    hard_limits: { pos_min: -0.8, pos_max: 0.8, vel_max: 4.0, tau_max: 8.0, temp_max: 65.0 }
    hold_gains:  { kp: 30.0,  kd: 1.5 }

# ============================================================================
# IMU (Adafruit BNO085 breakout on SPI) — optional
# ----------------------------------------------------------------------------
# When this block is present, the runtime opens `spi_device`, pulses the
# BNO into a clean SPI session via `rst_*`, subscribes to SH-2 report
# 0x28 (AR/VR-Stabilized Rotation Vector — the EMI-hardened replacement
# for the magnetometer-locking 0x05), and republishes the latest fused
# quaternion through `Snapshot.imu` / `TelemetryFrame.imu` so the
# operator app can render a live orientation indicator. RunPolicy still
# uses synthetic IMU until live readings are wired into `PolicyRunner`.
#
# # Bebop V2 wiring (the configuration below assumes this wiring)
#
# The Adafruit BNO085 breakout is mounted on the back of the torso PCB.
# The breakout's silkscreen labels change meaning when the board is set
# to **SPI mode** (PS0 = PS1 = 3V3); this is the table that matters:
#
#     ┌─────────────────┬──────────────────────────┬─────────────────────────────┐
#     │ Adafruit label  │ SPI-mode function        │ Jetson Orin Nano header pin │
#     ├─────────────────┼──────────────────────────┼─────────────────────────────┤
#     │ VIN             │ 3–5 V supply (regulated) │ pin 1 or 17 (3V3)           │
#     │ GND             │ ground                   │ any GND                     │
#     │ SCL             │ SCK (clock, input)       │ pin 23 (SPI1_SCK)           │
#     │ SDA             │ MISO (data out of BNO)   │ pin 21 (SPI1_MISO)          │
#     │ DI              │ MOSI (data into BNO)     │ pin 19 (SPI1_MOSI)          │
#     │ CS              │ chip select              │ pin 24 (SPI1_CS0)           │
#     │ INT (HINTN)     │ interrupt to host (LOW)  │ pin 7  (PAC.06)             │
#     │ RST             │ reset (active LOW)       │ pin 31 (PQ.06)              │
#     │ P0              │ mode select bit 0 = HIGH │ tied to 3V3                 │
#     │ P1              │ mode select bit 1 = HIGH │ tied to 3V3                 │
#     └─────────────────┴──────────────────────────┴─────────────────────────────┘
#
# `SDA` / `DI` are deliberately *swapped at the BNO side* relative to
# what the silkscreen looks like — the breakout reuses the I²C labels
# for SPI pins (`SDA` = MISO, `DI` = MOSI). Get this swap wrong and the
# `imu-probe` binary fails stage 2 with `InvalidChipId(0)` even though
# all the wires read continuous. Don't ask how we know.
#
# # GPIO line numbers (Jetson Orin Nano dev kit)
#
# Header pins on Orin Nano map to `gpiochip0` lines as follows — these
# are what `int_chip:` / `int_line:` and `rst_chip:` / `rst_line:`
# below refer to. Cross-check with `sudo gpioinfo gpiochip0`.
#
#     pin 7  → gpiochip0 line 144 (PAC.06)   ← INT (HINTN) on this robot
#     pin 31 → gpiochip0 line 106 (PQ.06)    ← RST on this robot
#
# Note: pins 11, 12, 13, 15, 16, 18, 22, 26, 29, 32, 33, 35, 36, 37,
# 38, 40 are also `gpiochip0` lines (mapping in `bebop-linux/src/config.rs`
# and in `imu_probe.rs` docs). The AON chip (`gpiochip1`, `tegra234-gpio-aon`)
# is NOT broken out to the 40-pin header — do not pick a line from there.
#
# # `mount:` block
#
# Describes how the chip is physically glued to the chassis. For each
# sensor axis, say which **body** axis it points along when the robot
# is upright at rest. Body frame is REP-103 / FLU: `+x = forward`,
# `+y = left`, `+z = up`. Accepted values are `+x`, `-x`, `+y`, `-y`,
# `+z`, `-z`; the config loader rejects any combination whose 3×3 matrix
# is not a proper right-handed rotation (det ≠ +1), e.g. duplicate axes
# or accidental reflections.
#
# The runtime post-multiplies every raw BNO reading by this constant
# rotation, so every downstream consumer (telemetry widget, future policy
# observation builder, ROS bridge) sees `q_world_body` — a single,
# body-frame orientation independent of mounting.
#
# # Defaults (when a key is omitted)
#
#   spi_device:                "/dev/spidev0.0"
#   int_chip:                  "gpiochip0"
#   int_line:                  (required — no sensible default)
#   rst_chip:                  "gpiochip0"
#   rst_line:                  (required — no sensible default)
#   rotation_vector_period_ms: 50      # 20 Hz report cadence hint
#   mount:                     identity (sensor frame == body frame)
# ============================================================================

imu:
  # SPI controller + INT/RST GPIOs for the Bebop V2 wiring above. These
  # values were validated on-bench with `cargo run --bin imu-probe`
  # streaming a clean 20 Hz quaternion at `|q| = 1.0` over 10 s. If you
  # rewire on a different robot, update both this block AND the wiring
  # comment at the top of this section, then re-run `imu-probe` to
  # confirm before launching the main binary.
  spi_device: "/dev/spidev0.0"
  int_chip:   "gpiochip0"
  int_line:   144                       # header pin 7  (PAC.06)
  rst_chip:   "gpiochip0"
  rst_line:   106                       # header pin 31 (PQ.06)
  rotation_vector_period_ms: 50

  # Bebop V2 PCB orientation: BNO chip sits flat on the back of the torso
  # with its silkscreen +X pointing toward the robot's *right* shoulder,
  # +Y toward the *front* of the chest, +Z out the *back* of the PCB
  # (= up, away from the spine). That is a +90° yaw of the sensor frame
  # relative to FLU body frame.
  mount:
    sensor_x: "-y"   # sensor +X → body -Y  (robot's right)
    sensor_y: "+x"   # sensor +Y → body +X  (forward)
    sensor_z: "+z"   # sensor +Z → body +Z  (up)

# ============================================================================
# Server settings (WebSocket + HTTP)
# ============================================================================
server:
  bind_addr: "0.0.0.0:9090"   # listen on all interfaces, port 9090
  telemetry_default_hz: 30
  telemetry_max_hz: 100

# ============================================================================
# Power board (Robstride PowerBoard) — battery / rail telemetry
# ----------------------------------------------------------------------------
# Lives on its own CAN bus (can4 in the V2 wiring). The runtime polls the
# board at `poll_interval_ms` for a Type-03 status frame (battery V, motor
# rail V, board temperature, fault word) and republishes the result to
# every WS client through `Snapshot.power` / TelemetryFrame.power.
#
# Battery chemistry below describes the *pack we ship with* — a 13s LFP
# (LiFePO4) pack managed by a JK-BMS, 40 Ah nominal. Per-cell endpoints
# match the BMS's own SOC anchors (SOC-100% = 3.445 V, SOC-0% = 2.700 V),
# giving a pack range of 13 × 3.45 = 44.85 V full → 13 × 2.70 = 35.10 V
# empty. The pack BMS will trip on cell UVP (2.50 V) before we ever get
# to the firmware's "0 %".
#
# The fuel gauge in the operator app is a linear interpolation between
# those endpoints. LFP's OCV curve is famously flat between roughly 20 %
# and 90 % SOC (cells sit at ~3.20–3.30 V across most of the discharge),
# so this estimate is good for "full / mostly full / getting low / dead"
# bucketing but should not be trusted to better than ±15 %. The on-pack
# JK-BMS does coulomb counting and is the authoritative SOC source if
# you need it — wire that in via the BMS's Bluetooth/UART protocol and
# replace this block with a coulomb-counter feed when accuracy matters.
#
# Comment out this block (or delete it) to skip power telemetry entirely;
# the runtime will still come up cleanly without a power board attached.
# ============================================================================
power:
  can_interface: can4
  power_id: 170             # Robstride PowerBoard default address 0xAA (param 6006)
  poll_interval_ms: 1000    # 1 Hz status polling — keeps the bus quiet
  battery_cells: 13         # 13s LFP pack (3.45 V × 13 = 44.85 V full)
  cell_full_voltage: 3.45   # LFP SOC-100% anchor (matches JK-BMS setting)
  cell_empty_voltage: 2.70  # LFP SOC-0%   anchor (matches JK-BMS setting)
